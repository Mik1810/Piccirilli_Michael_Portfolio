name: CI

on:
  # Validate the main branch after each push.
  push:
    branches:
      - main
  # Run the same checks before merging changes from feature branches.
  pull_request:

jobs:
  verify:
    # A single lightweight verification job is enough for this repo today.
    runs-on: ubuntu-latest

    steps:
      # Download the repository contents into the runner workspace.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use the same major Node version we target on Vercel and cache npm packages.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Store command output in separate files so failed runs are easier to inspect.
      - name: Prepare CI logs directory
        run: mkdir -p logs

      # Install exactly what is locked in package-lock.json for reproducible CI runs.
      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee logs/install.log

      # Catch style issues, unused code, and hook-rule violations early.
      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee logs/lint.log

      # Verify that the TypeScript codebase is still type-safe.
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee logs/typecheck.log

      # Ensure the production bundle can actually be generated.
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee logs/build.log

      # Mirror a readable log digest into the Actions run summary.
      - name: Publish CI log summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CI log summary"
            echo
            echo "Each full command log is already visible in the step output above."
            echo "The downloadable artifact is kept as a backup, but GitHub always serves artifacts as zip files."

            for file in logs/*.log; do
              [ -f "$file" ] || continue
              echo
              echo "### $(basename "$file")"
              echo '```text'
              tail -n 80 "$file"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      # Keep the logs even on failure so the GitHub Actions run is debuggable.
      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: logs
          if-no-files-found: error
